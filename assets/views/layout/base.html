<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Minventar{% endblock title %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    />
    <style>
        :root {
            --app-ink: #14213d;
            --app-accent: #dd6b20;
            --app-accent-soft: #fff1e5;
            --app-paper: #fffdfa;
            --app-line: rgba(20, 33, 61, 0.1);
            --app-shadow: 0 18px 50px rgba(20, 33, 61, 0.08);
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(221, 107, 32, 0.14), transparent 30%),
                linear-gradient(180deg, #fffaf4 0%, #f7f3ed 100%);
            color: var(--app-ink);
        }

        .app-shell {
            min-height: 100vh;
        }

        .app-card {
            background: rgba(255, 253, 250, 0.94);
            border: 1px solid var(--app-line);
            border-radius: 1.25rem;
            box-shadow: var(--app-shadow);
        }

        .app-hero {
            background:
                linear-gradient(135deg, rgba(20, 33, 61, 0.96), rgba(48, 71, 94, 0.92)),
                linear-gradient(135deg, rgba(221, 107, 32, 0.18), transparent);
            color: #fffdfa;
            border-radius: 1.5rem;
            box-shadow: var(--app-shadow);
        }

        .app-hero .btn-light {
            color: var(--app-ink);
        }

        .app-kicker {
            letter-spacing: 0.18em;
        }

        .app-chip {
            background: var(--app-accent-soft);
            border: 1px solid rgba(221, 107, 32, 0.22);
            border-radius: 999px;
            color: var(--app-accent);
            display: inline-flex;
            font-size: 0.75rem;
            font-weight: 700;
            gap: 0.35rem;
            padding: 0.35rem 0.7rem;
            text-transform: uppercase;
        }

        .app-metric {
            border-radius: 1rem;
            border: 1px solid var(--app-line);
            background: rgba(255, 255, 255, 0.72);
        }

        .app-search {
            border-radius: 999px;
            border: 1px solid var(--app-line);
            box-shadow: none;
        }

        .app-table thead th {
            color: rgba(20, 33, 61, 0.64);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .app-table tbody tr {
            vertical-align: middle;
        }

        .app-subtle {
            color: rgba(20, 33, 61, 0.65);
        }

        .app-stack {
            display: grid;
            gap: 1.5rem;
        }

        .app-form-panel {
            position: sticky;
            top: 1rem;
        }

        .app-locale-menu {
            position: relative;
        }

        .app-locale-toggle {
            align-items: center;
            background: #fff;
            border: 1px solid var(--app-line);
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            gap: 0.5rem;
            list-style: none;
            padding: 0.35rem 0.75rem;
        }

        .app-locale-toggle::-webkit-details-marker {
            display: none;
        }

        .app-locale-flag {
            border-radius: 999px;
            display: block;
            height: 1rem;
            object-fit: cover;
            width: 1.5rem;
        }

        .app-locale-panel {
            background: #fff;
            border: 1px solid var(--app-line);
            border-radius: 0.9rem;
            box-shadow: var(--app-shadow);
            min-width: 10rem;
            padding: 0.35rem;
            position: absolute;
            right: 0;
            top: calc(100% + 0.4rem);
            z-index: 20;
        }

        .app-locale-option {
            align-items: center;
            background: transparent;
            border: 0;
            border-radius: 0.7rem;
            display: flex;
            gap: 0.65rem;
            padding: 0.45rem 0.6rem;
            text-align: left;
            width: 100%;
        }

        .app-locale-option:hover,
        .app-locale-option:focus-visible {
            background: var(--app-accent-soft);
            outline: none;
        }

        .app-locale-option[aria-current="true"] {
            background: rgba(20, 33, 61, 0.06);
            font-weight: 600;
        }

        @media (max-width: 991.98px) {
            .app-form-panel {
                position: static;
            }
        }
    </style>
    {% block head %}{% endblock head %}
</head>
<body>
    {% include "shared/navbar.html" %}
    <main class="container py-4 app-shell">
        {% block content %}{% endblock content %}
    </main>
    {% block scripts %}{% endblock scripts %}
</body>
</html>
